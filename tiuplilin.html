<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marsya's Birthday</title>
  <link rel="stylesheet" href="tiuplilin.css" />
</head>
<body>

  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

  <canvas id="sparkleCanvas" aria-hidden="true"></canvas>

  <main class="scene" id="scene">

    <section class="cake-stage" id="cakeStage">

      <p class="tap-text" id="tapText">tap the screen</p>

      <div class="cake-wrap" id="cakeWrap">

        <h1 class="dynamic-text" id="dynamicText"></h1>

        <svg class="cake" id="cakeSvg" viewBox="0 0 280 260" aria-hidden="true">
        
          <ellipse cx="140" cy="232" rx="120" ry="14" fill="#f3c9dc" opacity="0.6" />

          <rect x="40" y="170" width="200" height="60" rx="14" fill="#fbdce9" />
          <rect x="40" y="170" width="200" height="14" rx="7" fill="#ffe9f2" />

          <rect x="60" y="120" width="160" height="58" rx="14" fill="#ffc4dd" />
          <rect x="60" y="120" width="160" height="14" rx="7" fill="#ffd9eb" />

          <rect x="85" y="78" width="110" height="50" rx="14" fill="#ffaecd" />
          <rect x="85" y="78" width="110" height="12" rx="6" fill="#ffd0e3" />

          <circle cx="75" cy="178" r="6" fill="#ffffff" opacity="0.8" />
          <circle cx="120" cy="182" r="5" fill="#ffffff" opacity="0.8" />
          <circle cx="205" cy="178" r="6" fill="#ffffff" opacity="0.8" />
          <circle cx="95" cy="128" r="5" fill="#ffffff" opacity="0.8" />
          <circle cx="185" cy="128" r="5" fill="#ffffff" opacity="0.8" />

          <circle cx="100" cy="150" r="3" fill="#ff8fb7" />
          <circle cx="160" cy="145" r="3" fill="#ffffff" />
          <circle cx="180" cy="200" r="3" fill="#ff8fb7" />
          <circle cx="70" cy="200" r="3" fill="#ffffff" />
        </svg>

        <div class="candle" id="candle">
          <button class="candle__flame" id="flame" aria-label="Blow out the candle">
            <span class="flame__core"></span>
            <span class="flame__glow"></span>
          </button>
          <div class="candle__stick"></div>
        </div>
      </div>
    </section>

    <section class="wish-box" id="wishBox">
      <div class="wish-box__inner">
        <textarea
          class="wish-box__textarea"
          id="wishTextarea"
          placeholder="Make a wish..."
          maxlength="200"
          rows="3"
        ></textarea>
        <button class="wish-box__send" id="wishSend" aria-label="Send wish" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12L21 3L15 21L11 13L2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <p class="wish-box__note">*you must make a wish before tapping the screen</p>
    </section>

    <section class="envelope-stage" id="envelopeStage">
      <button class="envelope" id="envelope" aria-label="Open envelope">
        <span class="envelope__back"></span>
        <span class="envelope__flap"></span>
        <span class="envelope__body"></span>
        <span class="envelope__button" aria-hidden="true">
          <span class="envelope__button-hole"></span>
          <span class="envelope__button-hole"></span>
          <span class="envelope__button-hole"></span>
          <span class="envelope__button-hole"></span>
        </span>
      </button>
    </section>

  </main>

  <footer class="site-footer">
    <span>made by @al</span>
  </footer>

  <script src="tiuplilin.js"></script>
</body>
</html>
