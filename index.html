<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marsya's birthday</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

  <canvas id="sparkleCanvas" aria-hidden="true"></canvas>

  <div class="toast" id="toast" role="alert" aria-live="assertive">
    <p class="toast__text">Oops, wrong!</p>
  </div>

  <main class="screen">

    <header class="prompt">
      <h1 class="prompt__title">Enter password</h1>
      <p class="prompt__hint" id="hintText">hint : your birthday</p>
    </header>

    <div class="dots" id="dots" role="status" aria-label="Password length indicator">
      <span class="dot" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
      <span class="dot" data-index="3"></span>
      <span class="dot" data-index="4"></span>
      <span class="dot" data-index="5"></span>
    </div>

    <section class="numpad-container" id="numpadContainer">
      <div class="numpad" id="numpad">
        <button class="key" data-key="1"><span>1</span></button>
        <button class="key" data-key="2"><span>2</span></button>
        <button class="key" data-key="3"><span>3</span></button>
        <button class="key" data-key="4"><span>4</span></button>
        <button class="key" data-key="5"><span>5</span></button>
        <button class="key" data-key="6"><span>6</span></button>
        <button class="key" data-key="7"><span>7</span></button>
        <button class="key" data-key="8"><span>8</span></button>
        <button class="key" data-key="9"><span>9</span></button>
        <button class="key key--action" data-key="ENT"><span>ENT</span></button>
        <button class="key" data-key="0"><span>0</span></button>
        <button class="key key--action" data-key="DEL"><span>DEL</span></button>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <span>made by @al</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
